apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: podinfo
  namespace: test
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: podinfo
  service:
    port: 9898
    targetPort: 9898
  analysis:
    interval: 30s    # 检查间隔
    threshold: 5     # 失败容忍上限
    stepWeight: 10   # 每次增加 10% 流量
    maxWeight: 50    # 最高到 50%
    metrics:
    - name: request-success-rate
      threshold: 99
      interval: 1m